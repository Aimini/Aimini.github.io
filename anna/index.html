    <style>
        @font-face {
            font-family: Cambria;
            src: url('fonts/cambria.ttc');
        }

        @font-face {
            font-family: "MV boli";
            src: url('fonts/mvboli.ttf');
        }

        @font-face {

            src: url('fonts/Fine Sans.ttf');

        html,
        body {
            height: 100%;
            padding: 0;
            margin: 0;
        }

        body {
            background: #fafafa;
        }

        #card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateX(0%);
            transition-duration: .4s;

        }

        #puzzle-cards {
            display: flex;
            flex-direction: row;
            align-items: center;
            transition-duration: .4s;
            z-index: -1;
        }

 

        #main-card-wrapper {
            transition-duration: .4s;
        }

        #main-card {
            width: 35em;
            height: 23.33em;
            position: relative;
            transform: perspective(1300px) rotateY(0deg);
            transform-origin: 50%;
            overflow: visible;
        }

        #main-card .front {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: .5rem;
        }

        #main-card .back {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: none;
            border-radius: .5rem;
        }

        #sign-group {
            position: absolute;
            right: 0;
            bottom: 0;
            padding: 1em;
            transform: translate(0,0);
            text-align: center;
            transition-duration: .2s;
        }

        #sign-group .one-sign {
            position: relative;
            transition-duration: .3s;
            display: inline-block;
        }
        #sign-group .one-sign .deco-animate-wrapper{
            border-radius: 3px;
            position: absolute;
            bottom: 0;
            left: 0;
            overflow: hidden;
            max-width: 0;
            transition-duration: .2s;
        }

        #sign-group .one-sign.selected .deco-animate-wrapper{
            max-width: 100%;
        }

        #sign-group .one-sign .letter {
            transition-duration: .3s;
            filter: invert(1) blur(0px);;
        }

        #sign-group .one-sign .deco {

        }

        #main-card-backimg-wrapper {
            overflow: hidden;
            border-radius: .5rem;
            width: 100%;
        }

        #main-card .header {
            height: 35%;
            top: -28%;
        }

        #main-card .header2 {
            height: 30%;
        }

        #div-nekos-group {
            position: absolute;
            right: 0;
            bottom: 1em;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.21));

        }

        #div-nekos-group-wrapper {
            transition-duration: .4s;
            transform-origin: 100% 100%;
            transform: translateY(0px) rotateZ(0deg);

            
            display: flex;
            padding: 0em .5em;
            background: #ffebef8f;
            /*   border-bottom-left-radius: .5em;
               border-top-left-radius: .5em;*/
            padding-left: 2em;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 1.5em 50%);
        }

        #div-nekos-answers {
            opacity: 0;
            transition-duration: .4s;
            position: absolute;
            width: 100%;
            text-align: center;
            left: 1em;
            top: .3em;
            color: #f48f93;;
            font-size: 2.3em;

        }


        .card {
            flex-shrink: 0;
            height: 21rem;
            width: 15rem; /*黄金分割对对对*/

            margin: 1em 1.5em;
            overflow: hidden; /*溢出的部分不显示*/
            border-radius: .5rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .2);

            transition: transform .4s, margin-bottom .2s, margin-top .2s, box-shadow .2s;
            transform: perspective(1300px) rotateY(0deg);
            transform-origin: 50%;
        }

        .card:hover {
            margin-top: .5em;
            margin-bottom: 1.5em;
            box-shadow: 0 6px 10px rgba(0, 0, 0, .1);
            cursor: pointer;
        }

        .card.invert, #main-card.invert {
            transform: perspective(1300px) rotateY(180deg);
        }
        
        .card .front {
            position: relative;
            height: 100%;
        }

        .card .front > img {
            width: 100%;
            height: 100%;
        }



        .card .header {
            background: rgba(237, 226, 196, 0.85);
            height: 25%;
            width: 200%;
            top: -15%;
            left: -10%;
            position: absolute;
            transform: rotate(-12deg);
        }

        .card .header2 {
            background: rgba(255, 205, 131, 0.68);
            height: 25%;
            width: 200%;
            top: -12%;
            left: -10%;
            position: absolute;
            transform: rotate(12deg);
        }

        .card .back {

            flex-direction: column;

        /*卡片背面回问题的样式 */
        .card .back .question {
            font-family: 幼圆;
            font-weight: bold;
            font-size: 1.1em;
        }

        .card .back .answer-area {
            text-align: center;
            font-size: 1.5em;
        }

        /*卡片背面回答区（包括输入框）的字体 */
        .card .back .answer-area, .card input[aie-answer-input] {
            font-family: "Cambria";
        }

        /*
        卡片背面输入框的样式
        */

        .card input[aie-answer-input] {
            backgrounnd: transparent;
            padding: .2em .3em;
            border: none;
            border-radius: 5px;
            outline: none;
            width: .7em;
            font-size: 1em;
            text-align: center;
            transition-duration: .2s;

            color: #222222bf;

        }

        .card.resolve input[aie-answer-input] {
            padding: .2em 0em;
            color: #ff6161bf;
        }

        .card input[aie-answer-input]:hover {
            box-shadow: 0 0px 1px rgba(0, 0, 0, .4) inset;
        }

        .card.resolve input[aie-answer-input]:hover {
            cursor: pointer;
        }

        .card input[aie-answer-input]:focus {
            box-shadow: 0 1px 1.5px rgba(0, 0, 0, .2) inset;
            background: #fcfcfc;
        }

        .card input[aie-answer-input][readonly] {
            box-shadow: none;

        }

        /*
         谜题卡片的左上角谜底的样式
         当解开此卡片后，左上角问号隐藏，显示数字
      */
        .card .front-answer {
            position: absolute;

            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.3);
            font-family: "MV boli";
            padding: .7em 1em;
        }

        .card .front-answer .front-answer-wrapper {
            position: relative;

        }

        .card .front-answer .front-answer-wrapper > span {

        }

        .card .front-answer .front-answer-wrapper > span[aie-answer] {

        }

        .card.resolve .front-answer .front-answer-wrapper > span {
            opacity: 0;
        }

        .card.resolve .front-answer .front-answer-wrapper > span[aie-answer] {
            opacity: 1;
        }

            font-size: 100%;
            color: #222;
            font-family: 黑体;

        }

          点击掉喵咪横条后
         */
        #main-card.solved-all.drop-down-nekos #div-nekos-group-wrapper ~ #div-nekos-answers {
            opacity: 1;
            font-family: "Fine Sans";
        }

        /*
          签名谜题样式，需要点击掉喵咪横条才能触发
         */
        #main-card.solved-all.drop-down-nekos:not(.solved-sign-puzzle) #sign-group .one-sign:hover {
            filter: drop-shadow(0px 1px 2px rgba(0, 0, 0, .41));
        }

        #main-card #sign-group .one-sign:nth-child(3) {
            display: inline-flex;
            overflow: hidden;
            max-width: 100%;
        }

        #main-card.solved-all.drop-down-nekos #sign-group .one-sign.blur:not(.selected) {
            filter: blur(2px);
        }

        #main-card.solved-all.drop-down-nekos:not(.solved-sign-puzzle) #sign-group .one-sign:hover img {
             transform: scale(1.1);
         }

        #main-card.solved-all.drop-down-nekos.solved-sign-puzzle #sign-group .one-sign:nth-child(3).hide {
            max-width: 0;
        }

        /*
         最后调出爱心的svg
         */
        #main-card .front-last,#main-card .back-last{
            height: 100%;
            align-items: center;
            justify-content: center;
            display: flex;
        }
        #main-card  svg{
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, .2));
            overflow: visible;
            transition-duration: .2s;
        }
        #main-card.solved-all.drop-down-nekos.solved-sign-puzzle.the-last-heart:hover{
            margin-top: 1em;
            margin-bottom: 1em;
        }

        #main-card  svg:hover{
            margin-top: -0.5em;
            margin-bottom: .5em;
            filter: drop-shadow( 0 1px 2px rgba(0, 0, 0, .2));
        }

        #main-card  .text{
           position: absolute;
        }

        @media screen and (max-width: 650px) {
            #puzzle-cards {
                flex-direction: column;

        }

    <script>

        /*

        function initMyToolFunction() {
            Element.prototype.toggleClass =
                function (className) {
                    if (this.classList.contains(className)) {
                        this.classList.remove(className);
                    }
                    else {
                        this.classList.add(className);
                    }
                }

            Element.prototype.hasClass = function (className) {
                return this.classList.contains(className);
            }
        }


        //卡片列表

        var $divNekosGroup;

        */

                var answerStr = parentCard.querySelector("[aie-answer]").innerText.trim();

            });
             $divNekosGroup.click();

        /*
        * 翻转所有卡片，方便调试样式，
       */
        function inverAllCard() {
            document.querySelectorAll(".card").forEach(function (e) {
                e.click();
            })
        }


        /*
        */
        var imgSrcList = ["1.png", "2.png", "3.png", "4.png"];
        var imgAnswer = [1, 4, 5, 2];
        var colorTable = [
            ["rgba(237, 226, 196, 0.85)", "rgba(255, 205, 131, 0.68)"],
            ["rgba(234, 188, 203, 0.85)", "rgba(255, 179, 191, 0.68)"],
            ["rgba(196, 228, 237, 0.85)", "rgba(160, 204, 255, 0.68)"],
            ["rgba(222, 196, 237, 0.85)", "rgba(197, 157, 255, 0.68)"]];

        //获取下一组卡片的数据
        // imgSrc,imgMainCardSrc,imgAnswer
        var useIdxList = null;

        function nextCardData() {
            if (useIdxList == null) {
                useIdxList = [];
                imgSrcList.forEach(function (ele, idx) {
                    useIdxList.push(idx);
                });
            }

            var idx = Math.floor(Math.random() * useIdxList.length);
            var imgScrListIdx = useIdxList[idx];
            useIdxList = useIdxList.filter(e => e != imgScrListIdx);

            var oneImgSrc = imgSrcList[imgScrListIdx];
            var dotIdx = oneImgSrc.lastIndexOf('.');
            var name = oneImgSrc.substr(0, dotIdx);
            var subfix = oneImgSrc.substr(dotIdx, oneImgSrc.length);
            var oneMainCardImgSrc = name + "_bg" + subfix;
            return [oneImgSrc, oneMainCardImgSrc, imgAnswer[imgScrListIdx]]
        }

        /*
        生成卡片，现在没啥用了
        */
        function createCards() {
            var $divNekosGroupWrapper = document.getElementById('div-nekos-group-wrapper');
            imgSrcList.forEach(
                function (imgSrc, idx) {
                    var $oneCard = document.createElement("div");
                    var oneCardData = nextCardData();
                    var colorPair = colorTable[idx % colorTable.length];
                    $oneCard.innerHTML = `
                     <div class="card">

                                <span class=" header" style="background:${colorPair[0]}">

                                    <span aie-answer >

                                        ?
                                    </span>
                                    </div>
                                </div>
                            <img src=" ${oneCardData[0]}">
                        </div>
                        <div class="back" style="display: none">
                            <input type="text" aie-answer-input placeholder="?">
                        </div>
                    </div>
                `;
                    $oneCard = $oneCard.firstElementChild;
                    var $oneCardImg = $oneCard.getElementsByTagName("img")[0];
                    $cardContainers.appendChild($oneCard);
                    adjustSize($oneCardImg, $oneCard.clientWidth, $oneCard.clientHeight);

                    var $MianCardImg = document.createElement("img");
                    $MianCardImg.setAttribute("src", oneCardData[1]);
                    $divNekosGroupWrapper.appendChild($MianCardImg);
                    adjustSize($MianCardImg, 63.6042, 90);

                }
            )
        }

        //调整图片大小，使其充满指定的宽和高，
        function adjustSize($img, width, height) {
            let a = function () {
                let imgW = $img.naturalWidth;
                let imgH = $img.naturalHeight;
                let wScale = width / imgW;
                let hScale = height / imgH;
                let scale = Math.max(wScale, hScale);
                $img.setAttribute("height", imgH * scale);
                $img.setAttribute("width", imgW * scale);
            };
            $img.onload = a;
        }

        function adjustSizeFitHeight($img, height) {
            let a = function () {
                let imgW = $img.naturalWidth;
                let imgH = $img.naturalHeight;
                let hScale = height / imgH;
                $img.setAttribute("height", imgH * hScale);
                $img.setAttribute("width", imgW * hScale);
            };

            $img.onload = a;
            if ($img.width !== 0)
                a();

        };

        let cardsContainerScrollX = 0;


        /*
        * 监听滚动事件，用于卡片横向滚动
        * 
        function windowAddMouseWheel() {
            let scrollFunc = function (e) {
                //浏览器的宽度
                let documnetW = document.documentElement.clientWidth || document.body.clientWidth;
                e = e || window.event;
                if (e) {  //判断浏览器IE，谷歌滑轮事件
                    let delta = e.wheelDelta | e.detail*60;
                    let nextScrollX = cardsContainerScrollX + 1.2 * delta;
                    //如果滚动到最左边
                    if (nextScrollX < 0) {
                        cardsContainerScrollX = 0;
                        //如果滚动到最右边
                    } else if (nextScrollX > $cardContainers.scrollWidth - documnetW)
                        cardsContainerScrollX = $cardContainers.scrollWidth - documnetW;
                    else
                        cardsContainerScrollX = nextScrollX;
                    $cardContainers.style.transform = "translateX(-" + cardsContainerScrollX + "px)";
                }

            };
            //给页面绑定滑轮滚动事件
            if (document.addEventListener) {
                document.addEventListener('DOMMouseScroll', scrollFunc, false);
                document.addEventListener('mousewheel', scrollFunc, false);
            }
        }*/

        /********************************************************************************************************
         *从下面的代码开始都是解密部分的逻辑了
         *
         *
         *******************************************************************************************************/

        const STAGE_BEGIN = 0;
        const STAGE_SOLVED_ALL_CARD_PUZZLE = 1;
        const STAGE_DROP_DOWN_NEKOS_GROUP = 2;
        const STAGE_SOLVED_SIGN_PUZZLE = 3;

        function currentState() {
            let cl = $mainCard.classList;
            if (cl.contains('solved-all')) {
                if (cl.contains("drop-down-nekos")) {
                    if (cl.contains('solved-sign-puzzle')) {
                        return STAGE_SOLVED_SIGN_PUZZLE;
                    } else {
                        return STAGE_DROP_DOWN_NEKOS_GROUP
                    }
                } else {
                    return STAGE_SOLVED_ALL_CARD_PUZZLE;
                }
            } else {
                return STAGE_BEGIN;
            }
        }

        /*
            反转主卡片，用于查看背面对应位置的数字
         */
        function invertMainCard() {
            let card = this;
            let isInvert = card.classList.contains("invert");
            let cardBack = this.getElementsByClassName("back")[0];
            let cardFront = this.getElementsByClassName("front")[0];
            card.toggleClass("invert");
            setTimeout(function () {
                cardBack.style.display = !isInvert ? "" : "none";
                cardFront.style.display = isInvert ? "" : "none";
            }, 113);//别问我秒数怎么来的，chrome里一帧一帧的看
            /*
                默认的曲线是ease，现在可以看它的函数图像来估计
             */
        }

        /*
        检查输入框是否与答案想对应，如果对应则自动翻转到正面，
        如果全部解出则调用resolvedAll函数
        */

        let solvedPuzzleNum = 0;

        function checkInputAnswer(targetAnswerInput) {
            let parentCard = targetAnswerInput.closest(".card");
            let answerStr = parentCard.querySelector("[aie-answer]").innerText.trim();
            if (answerStr == targetAnswerInput.value) {
                targetAnswerInput.setAttribute("readonly", true);
                parentCard.classList.add("resolve");
                solvedPuzzleNum += 1;
                //自动翻转到正面
                if (parentCard.classList.contains("invert")) {
                    setTimeout(function () {
                        parentCard.click();
                    }, 300);
                }
                if (solvedPuzzleNum === imgSrcList.length) {
                    solvedAllCardPuzzle();
                }
            }
        }

        /*
         * 绑定答案到输入框,同时防止输入框click事件冒泡
         */
        function bindAnswerToInput(answer) {
            document.body.addEventListener('input', function (event) {
                let answers = this.querySelectorAll("input[aie-answer-input]");

                answers = [].slice.call(answers);
                let targetAnswerInput = event.target;
                if (answers.filter(i => i === targetAnswerInput).length > 0) {
                    checkInputAnswer(targetAnswerInput);
                }
            }, false);

            document.body.addEventListener('click', function (event) {
                let answers = this.querySelectorAll("input[aie-answer-input]");

                answers = [].slice.call(answers);
                let targetAnswerInput = event.target;
                let parentCard = targetAnswerInput.closest(".card");
                if (answers.filter(i => i === targetAnswerInput).length > 0) {
                    if (!parentCard.classList.contains("resolve")) {
                        event.stopPropagation();
                        console.log("input被点击，阻止冒泡");
                    }
                }
            }, true)
        }


        function solvedAllCardPuzzle() {
            let documnetW = document.documentElement.clientWidth || document.body.clientWidth;
            let documentH = document.documentElement.clientHeight || document.body.clientHeight;

            let mainCardHeight = $mainCardWrapper.scrollHeight;
            let totalHeight = $mainCardWrapper.scrollHeight + $puzzleCards.scrollHeight;
            let y1 = (documentH - totalHeight) / 2;
            let y2 = y1 + mainCardHeight;


            let offX;
            let offY;
            offX = (documnetW - $mainCardWrapper.scrollWidth) / 2 - $mainCardWrapper.offsetLeft;
            offY = y1 - $cardContainers.offsetTop;
            if (totalHeight >= documentH)
                offY = -$cardContainers.offsetTop;
            // $mainCardWrapper.style.transform = $mainCardWrapper.style.transform + "translateX(" + offX + "px) translateY(" + offY + "px)";

            offX = (documnetW - $puzzleCards.scrollWidth) / 2 - $puzzleCards.offsetLeft;
            offY = y2 - ($cardContainers.offsetTop + $puzzleCards.offsetTop);

            let  mT = (documentH - $mainCardWrapper.scrollHeight)/2 -  ($mainCardWrapper.offsetTop + $cardContainers.offsetTop);
            mT /= mainCardScale;
            //$puzzleCards.style.transform = $puzzleCards.style.transform + "translateX(" + offX + "px)  translateY(" + offY + "px) SCALE(.5)";

            $puzzleCards.style.height = $puzzleCards.clientHeight + 'px';
            $puzzleCards.style.overflow = 'hidden';

                function(){

                        $cardContainers.style.transform = "translateY(50%)";
                        AdjustMainCard();
                    //    $puzzleCards.style.display = "None";

                    }, 400);

                }
            ,0);

            $mainCard.classList.add("solved-all");
        }

        /********************************************************************************
         * 解出四个卡片之后的部分
         ***************************************************************************/

        /*
            解出四个卡片的谜题后，点击喵咪横条，横条会掉落
            ，显示出数字
         */
        function bindNekoGroupClick() {
            $mainCard.addEventListener('click', function (event) {
                let targetElement = event.target;
                if (targetElement === $divNekosGroup || targetElement.closest("#div-nekos-group") != null) {
                    if (currentState() === STAGE_SOLVED_ALL_CARD_PUZZLE) {
                        event.stopPropagation();
                        $mainCard.classList.add("drop-down-nekos");
                    }
                }
            }, true)
        }

        /*
           横条掉落后，就可以开始解决签名谜题了，只要按照指定的顺序点击签名就行了。
        */
        function bindSignPuzzleMouseOverOrLeave() {
            let $signLetters = $signGroup.querySelectorAll(".one-sign");
            $signLetters = [].slice.call($signLetters);
            
            $mainCard.addEventListener('mouseenter', function (event) {
                if (currentState() === STAGE_DROP_DOWN_NEKOS_GROUP)
                    return;

                let targetElement = event.target.closest(".one-sign");
                if (targetElement === null)
                    return;

                if ($signLetters.filter(e => e === targetElement).length === 0)
                    return;
                    
                targetElement.classList.remove("blur");
                $signLetters.filter(e => e !== targetElement).forEach(
                    e => e.classList.add("blur")
                )
            }, true);

            $mainCard.addEventListener('mouseout', function (event) {
                let targetElement = event.target;
                if (targetElement.closest(".one-sign") !== null)
                    targetElement = targetElement.closest(".one-sign");
                if ($signLetters.filter(e => e === targetElement).length > 0) {
                    if (currentState() === STAGE_DROP_DOWN_NEKOS_GROUP) {
                        $signLetters.forEach(e => e.classList.remove("blur"))
                    }
                }
            }, true)
        }


        //*用户点击签名字符的顺序，恢复
        let userClickOrder = [];
        function bindSignPuzzleClick() {
            $mainCard.addEventListener('click', function (event) {
                let $signLetters = $signGroup.querySelectorAll(".one-sign");
                $signLetters = [].slice.call($signLetters);
                let targetElement = event.target;
                if (targetElement.closest(".one-sign") !== null)
                    targetElement = targetElement.closest(".one-sign");
                if ($signLetters.filter(e => e === targetElement).length > 0) {
                    if (currentState() === STAGE_DROP_DOWN_NEKOS_GROUP) {
                        event.stopPropagation();
                        targetElement.classList.add("selected");
                        let idx = -1;
                        $signLetters.forEach(function(one,one_idx){
                                if(one === targetElement)
                                    idx = one_idx;
                            });
                        userClickOrder.push(idx + 1);
                        for (let i = 0; i < userClickOrder.length; i++) {
                            if(imgAnswer[i] !== userClickOrder[i]){
                                userClickOrder = [];
                                $signLetters.forEach(function(one){
                                    one.classList.remove("selected");
                                });
                                break;
                            }
                            if(i == imgAnswer.length - 1){
                                solvedSignPuzzle();
                            }
                        }
                    }
                }
            }, true)
        }
        
        function  solvedSignPuzzle() {
            let l = ($mainCard.scrollWidth - $signGroup.scrollWidth)/2 - $signGroup.offsetLeft;
            let t = ($mainCard.scrollHeight - $signGroup.scrollHeight)/2 -  $signGroup.offsetTop;
            let $signLetters = $signGroup.querySelectorAll(".one-sign");
            $signLetters.forEach(function(one){
                one.classList.remove("selected");
                one.classList.remove("blur");
            });



            //当签名移动到中间后，调整布局;先使用translate移动到中间（为了动画），然后抛弃translate,使用flex居中（为了之后的自适应）
            setTimeout(function () {
                $signGroup.style.transform = `translate(${l}px,${t}px)`;
                $signGroup.querySelector(".one-sign:nth-child(5)").style.transform = "translateX(-28px)";
                $signGroup.querySelector(".one-sign:nth-child(4)").style.transform = "translateX(39px)";
                setTimeout(function () {
                    $signGroup.style.right = "auto";
                    $signGroup.style.bottom = "auto";
                    $signGroup.style.transitionDuration = "0s";
                    $signGroup.style.transform = "translate(0,0)";
                    let $hideLetter = $signGroup.querySelector(".one-sign:nth-child(3) .letter");

                    (function () {
                        let width = $hideLetter.scrollWidth;
                        function step(timestamp) {
                            width -= 10;
                            if (width > 0 ) {
                                $hideLetter.style.width = width + "px";
                                requestAnimationFrame(step);
                            }
                            else{
                                $hideLetter.style.width =  "0px";
                            }
                        }
                        requestAnimationFrame(step);
                    })();

                },400);
            },300);
            $mainCard.classList.add("solved-sign-puzzle");
            $mainCard.onclick = theLastMainCardClickInvert;
        }

        var setFront = false;
        var setBack = false;
        function theLastMainCardClickInvert(){

            let card = this;
            let cardBack = this.getElementsByClassName("back-last")[0];
            let cardFront = this.getElementsByClassName("front-last")[0];
            let isInvert = card.classList.contains("invert");
            if(isInvert && !setFront){
                $mainCardFront.style.display = "none";
            }else{
                if(!setBack)
                {
                    $mainCardBack.style.display = "none";
                }
            }

            $mainCard.classList.add("the-last-heart");
            card.toggleClass("invert");
            setTimeout(function () {
                cardBack.style.display = !isInvert ? "" : "none";
                if(!setFront){
                    $mainCardFront.style.display = "none";
                }
                cardFront.style.display = isInvert ? "" : "none";
                if(!setBack){
                    $mainCardBack.style.display = "none";
                }
                $mainCard.style.boxShadow = "0 0px 0px rgba(0, 0, 0, 0)";
            }, 113);
        }
        function AdjustMainCard()
        {
            if(mainCardWidth === 0)
            {
                mainCardHeight = $mainCardWrapper.clientHeight;
                mainCardWidth = $mainCardWrapper.clientWidth;
                mainCardWHRatio = 1.5;
            }
            if(document.body.clientWidth <= 650)
            {
                $mainCard.style.width = "calc(" + document.body.clientWidth + "px - 3em)";
                $mainCard.style.height = ($mainCardWrapper.clientWidth / mainCardWHRatio) +"px";
            }
            else
            {
                
                $mainCard.style.width = "";
                $mainCard.style.height = "";
            }
        }
    </script>
